function sourceMetaForGroup(g){
  const fallbackSrc=g.type==='symbol'?'poi_label':'natural';
  const typeValue=(g&&typeof g.typeValue==='string')?g.typeValue.trim().toLowerCase():'';
  if(g.type==='symbol'&&(AERODROME_LABEL_CLASSES.has(typeValue)||AERODROME_LABEL_ALIASES.has(typeValue))) return AERODROME_LABEL_META;
  const srcMeta=SRCS[g.src];
  if(srcMeta && sourceSupportsGroupType(g.type,srcMeta)) return srcMeta;
  return SRCS[fallbackSrc];
}

function typeFilterForGroup(g){
  const srcMeta=sourceMetaForGroup(g);
  const typeField=srcMeta.typeField||'type';
  const subtypeField=srcMeta.subtypeField||'';
  const typeValue=(g.typeValue||'').trim().toLowerCase();
  if(!typeValue) return null;
  const subtypeValue=(g.subtypeValue||'').trim().toLowerCase();
  if(srcMeta.sourceLayer===AERODROME_LABEL_META.sourceLayer&&AERODROME_LABEL_ALIASES.has(typeValue)){
    return ['has',typeField];
  }
  const filterExpr=['==',['get',typeField],typeValue];
  return (subtypeField&&subtypeValue) ? ['all',filterExpr,['==',['get',subtypeField],subtypeValue]] : filterExpr;
}

function layerDefinitionForGroup(id,g,src,filterExpr,oMin,oMax,layout,paint){
  const def={
    id,
    type:(g.type==='symbol'||g.type==='edgepoints') ? 'symbol' : g.type==='linepattern' ? 'line' : 'fill',
    source:src.source,
    minzoom:oMin,
    maxzoom:oMax,
    layout
  };
  if(src.sourceLayer) def['source-layer']=src.sourceLayer;
  if(filterExpr) def.filter=filterExpr;
  if(paint) def.paint=paint;
  return def;
}

function previewCanvasForIcon(iconName,maxW,maxH){
  const src=pool[iconName]&&pool[iconName].canvas;
  if(!src) return null;
  const c=src.cloneNode();
  c.width=src.width;
  c.height=src.height;
  c.getContext('2d').drawImage(src,0,0);
  c.style.cssText='display:block;width:auto;height:auto;max-width:'+maxW+'px;max-height:'+maxH+'px;image-rendering:pixelated';
  return c;
}

function patternSwatchForIcon(iconName){
  const src=pool[iconName]&&pool[iconName].canvas;
  if(!src) return null;
  const c=document.createElement('canvas');
  c.width=30;
  c.height=24;
  const ctx=c.getContext('2d');
  const pattern=ctx.createPattern(src,'repeat');
  if(pattern){
    ctx.fillStyle=pattern;
    ctx.fillRect(0,0,c.width,c.height);
  }else{
    ctx.drawImage(src,0,0,Math.min(src.width,c.width),Math.min(src.height,c.height));
  }
  c.style.cssText='display:block;width:30px;height:24px;image-rendering:pixelated';
  return c;
}

function linePatternSwatchForIcon(iconName,lineGapPx,lineHeightScale,lineOrganic,variantSeed){
  const src=pool[iconName]&&pool[iconName].canvas;
  if(!src) return null;
  const base=derivedLinePatternCanvas(src,20,lineGapPx,lineHeightScale,lineOrganic,variantSeed);
  const c=document.createElement('canvas');
  c.width=30;
  c.height=20;
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(base,0,0,c.width,c.height);
  c.style.cssText='display:block;width:30px;height:20px;image-rendering:pixelated';
  return c;
}

function symbolSizeValue(slot,tileSizes,useMax=false){
  const px=useMax ? (slot.pxMax||slot.px) : slot.px;
  return px/(tileSizes[slot.icon]?tileSizes[slot.icon].w:pool[slot.icon].w);
}

function symbolSizeExpression(valid,g,tileSizes){
  if(g.smoothScale===true){
    const expr=['interpolate',['linear'],['zoom']];
    valid.forEach(slot=>{
      const startZ=Number(slot.zMin)||0;
      const endZ=Number(slot.zMax)||startZ;
      const startSize=symbolSizeValue(slot,tileSizes,false);
      const endSize=symbolSizeValue(slot,tileSizes,true);
      const lastZ=expr.length>3?expr[expr.length-2]:null;
      if(lastZ===startZ){
        expr[expr.length-1]=startSize;
      }else if(lastZ===null||startZ>lastZ){
        expr.push(startZ,startSize);
      }
      const nextLastZ=expr.length>3?expr[expr.length-2]:null;
      if(endZ>nextLastZ) expr.push(endZ,endSize);
    });
    if(expr.length<7) return symbolSizeValue(valid[0],tileSizes);
    return expr;
  }
  if(valid.length===1) return symbolSizeValue(valid[0],tileSizes);
  return stepExpression(
    symbolSizeValue(valid[0],tileSizes),
    valid.slice(1).map(slot=>({zoom:Number(slot.zMin)||0,value:symbolSizeValue(slot,tileSizes)}))
  );
}

function syncLegendState(){
  legendState=groups.map(g=>{
    const src=sourceMetaForGroup(g);
    const slots=g.slots
      .filter(s=>s.icon&&pool[s.icon])
      .map(s=>({zMin:Number(s.zMin)||0,zMax:Number(s.zMax)||0,icon:s.icon}))
      .sort((a,b)=>a.zMin-b.zMin);
    return {
      id:g.id,
      name:g.name,
      type:g.type,
      visible:g.visible!==false,
      sourceLayer:src.sourceLayer,
      typeValue:(g.typeValue||'').trim(),
      subtypeValue:(g.subtypeValue||'').trim(),
      slots
    };
  }).filter(g=>g.visible!==false&&g.slots.length&&g.typeValue);
}

function legendSlotForZoom(slots,zoom){
  let fallback=null;
  for(let i=0;i<slots.length;i++){
    const slot=slots[i];
    if(!fallback) fallback=slot;
    if(zoom>=slot.zMin&&zoom<=slot.zMax) return slot;
    if(zoom>=slot.zMin) fallback=slot;
  }
  return fallback;
}

function updateLegend(){
  const legend=document.getElementById('legend');
  if(!legend) return;
  if(!legendState.length||!ready){
    legend.innerHTML='';
    legend.style.display='none';
    return;
  }

  const z=map.getZoom();
  legend.innerHTML='';
  const title=document.createElement('div');
  title.className='legend-title';
  title.textContent='Legend';
  legend.appendChild(title);

  let rowCount=0;
  legendState.forEach(g=>{
    const slot=legendSlotForZoom(g.slots,z);
    if(!slot||!pool[slot.icon]) return;

    const row=document.createElement('div');
    row.className='legend-row';

    const swatch=document.createElement('div');
    swatch.className='legend-swatch';
    const iconCanvas=g.type==='pattern' ? patternSwatchForIcon(slot.icon) : g.type==='linepattern' ? linePatternSwatchForIcon(slot.icon,g.lineGapPx,g.lineHeightScale,g.lineOrganic,g.id) : previewCanvasForIcon(slot.icon,26,20);
    if(iconCanvas) swatch.appendChild(iconCanvas);

    const meta=document.createElement('div');
    meta.className='legend-meta';

    const name=document.createElement('div');
    name.className='legend-name';
    name.textContent=g.typeValue;

    const filter=document.createElement('div');
    filter.className='legend-filter';
    const srcMeta=sourceMetaForGroup(g);
    filter.textContent=(srcMeta.subtypeField&&g.subtypeValue) ? srcMeta.subtypeField+'='+g.subtypeValue : '';

    meta.appendChild(name);
    if(filter.textContent) meta.appendChild(filter);
    row.appendChild(swatch);
    row.appendChild(meta);
    legend.appendChild(row);
    rowCount++;
  });

  if(!rowCount){
    legend.innerHTML='';
    legend.style.display='none';
    return;
  }
  legend.style.display='block';
}

function beforeLayerForGroup(g){
  const src=sourceMetaForGroup(g);
  const firstSymbol=(map.getStyle().layers||[]).find(layer=>layer.type==='symbol');
  if(g.type==='symbol'&&avoidsNativeLabelCollisions(g)){
    return undefined;
  }
  if((g.type==='symbol'||g.type==='edgepoints'||g.type==='linepattern')&&firstSymbol&&map.getLayer(firstSymbol.id)){
    return firstSymbol.id;
  }
  if(src.beforeId && map.getLayer(src.beforeId)) return src.beforeId;
  if(Array.isArray(src.beforeIdCandidates)){
    const beforeId=src.beforeIdCandidates.find(id=>map.getLayer(id));
    if(beforeId) return beforeId;
  }
  if(Array.isArray(src.beforeSourceLayers)){
    const beforeLayer=(map.getStyle().layers||[]).find(layer=>src.beforeSourceLayers.includes(layer['source-layer']));
    if(beforeLayer&&map.getLayer(beforeLayer.id)) return beforeLayer.id;
  }
  if(src.drawBelowLabels===true){
    if(firstSymbol&&map.getLayer(firstSymbol.id)) return firstSymbol.id;
  }
  if(src.pt) return undefined;
  return firstSymbol&&map.getLayer(firstSymbol.id) ? firstSymbol.id : undefined;
}

function canvasToBlob(canvas){
  return new Promise((resolve,reject)=>{
    canvas.toBlob(blob=>blob ? resolve(blob) : reject(new Error('Sprite PNG could not be created')),'image/png');
  });
}

function blobToDataUrl(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(reader.error||new Error('Sprite PNG could not be read'));
    reader.readAsDataURL(blob);
  });
}

async function uploadSpriteToServer(spriteJson,spriteCanvas,sprite2xJson,sprite2xCanvas){
  const spriteBlob=await canvasToBlob(spriteCanvas);
  spritePngDataUrl=await blobToDataUrl(spriteBlob);
  png2xBlob=sprite2xCanvas ? await canvasToBlob(sprite2xCanvas) : null;
  sprite2xPngDataUrl=png2xBlob ? await blobToDataUrl(png2xBlob) : '';
  const payload={
    spriteJson,
    spritePngDataUrl,
    sprite2xJson,
    sprite2xPngDataUrl
  };
  const res=await fetch(SPRITE_UPLOAD_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  if(!res.ok){
    const msg=await res.text();
    throw new Error('Sprite upload failed: '+(msg||res.status));
  }
  return spriteBlob;
}

async function build(){
  if(!Object.keys(pool).length){ss('No icons in pool','err');return;}
  if(!ready){ss('Map is not ready yet','err');return;}

  const PAD=8;
  const usedIconNames=new Set();
  groups.forEach(g=>g.slots.forEach(s=>{
    if(s.icon&&pool[s.icon]) usedIconNames.add(s.icon);
  }));
  const names=Object.keys(pool).filter(name=>usedIconNames.has(name));
  if(!names.length){
    ss('No used icons assigned to any group','err');
    return;
  }

  // Remove previous preview layers before refreshing runtime images.
  active.forEach(id=>{try{if(map.getLayer(id))map.removeLayer(id);}catch(e){}});
  active=[];
  clearGeneratedSources();
  clearGeneratedVariantImages();

  // Pre-compute tile sizes (scale to largest configured sizePx per icon)
  const tileSizes={};
  names.forEach(name=>{
    let sz=1;
    groups.forEach(g=>g.slots.forEach(s=>{
      if(s.icon===name){
        sz=Math.max(sz,s.px,s.pxMax||s.px);
      }
    }));
    const ic=pool[name];
    tileSizes[name]={w:sz, h:Math.round(sz*(ic.h/ic.w))};
  });
  const tw=names.reduce((s,n)=>s+tileSizes[n].w+PAD,0);
  const mh=Math.max(...names.map(n=>tileSizes[n].h));
  const cv=document.createElement('canvas');
  cv.width=Math.max(tw,1); cv.height=Math.max(mh,1);
  const ctx=cv.getContext('2d');
  const cv2x=document.createElement('canvas');
  cv2x.width=Math.max(tw*2,1); cv2x.height=Math.max(mh*2,1);
  const ctx2x=cv2x.getContext('2d');
  const jout={};
  const jout2x={};
  let x=0;

  names.forEach(name=>{
    const ic=pool[name];
    const tileW=tileSizes[name].w, tileH=tileSizes[name].h;
    ctx.drawImage(ic.canvas,x,0,tileW,tileH);
    const cfg=[];
    groups.forEach(g=>g.slots.forEach(s=>{
      if(s.icon===name){
        const src=sourceMetaForGroup(g);
        cfg.push({
          group:g.name,
          layerType:g.type,
          visible:g.visible!==false,
          smoothScale:g.smoothScale===true,
          opacity:normalizedOpacity(g),
          lineGapPx:normalizedLineGapPx(g),
          lineHeightScale:normalizedLineHeightScale(g),
          lineOrganic:normalizedLineOrganic(g),
          patternFadeEnabled:normalizedPatternFadeEnabled(g),
          patternFadeWidthPx:normalizedPatternFadeWidthPx(g),
          patternFadeOpacity:normalizedPatternFadeOpacity(g),
          source:src.source,
          sourceLayer:src.sourceLayer,
          typeValue:(g.typeValue||'').trim(),
          subtypeValue:(g.subtypeValue||'').trim(),
          zoomMin:s.zMin,
          zoomMax:s.zMax,
          sizePx:s.px,
          sizePxMax:s.pxMax||s.px
        });
      }
    }));
    jout[name]={x,y:0,width:tileW,height:tileH,pixelRatio:1};
    if(cfg.length) jout[name].config=cfg;
    const x2=x*2, tileW2=tileW*2, tileH2=tileH*2;
    ctx2x.drawImage(ic.canvas,x2,0,tileW2,tileH2);
    jout2x[name]={x:x2,y:0,width:tileW2,height:tileH2,pixelRatio:2};
    if(cfg.length) jout2x[name].config=cfg;
    x+=tileW+PAD;
  });
  jsonOut=jout;
  json2xOut=jout2x;

  // Register images - ImageData with premultipliedAlpha:false (synchronous, no size mismatch)
  names.forEach(name=>{
    if(map.hasImage(name)) try{map.removeImage(name);}catch(e){}
    const inf=jout[name];
    if(!inf.width||!inf.height) return;
    const ic2=document.createElement('canvas');
    ic2.width=inf.width; ic2.height=inf.height;
    ic2.getContext('2d').drawImage(pool[name].canvas,0,0,inf.width,inf.height);
    const imgData=ic2.getContext('2d').getImageData(0,0,inf.width,inf.height);
    try{
      map.addImage(name,
        {width:inf.width,height:inf.height,data:imgData.data},
        {premultipliedAlpha:false}
      );
    }catch(e){console.warn(name,e);}
  });

  let sc=0,pc=0,lc=0,ec=0,skipped=0;
  orderedGroupsForMapBuild().forEach(g=>{
    const valid=g.slots.filter(s=>s.icon&&pool[s.icon]).sort((a,b)=>a.zMin-b.zMin);
    if(!valid.length)return;
    const src=sourceMetaForGroup(g);
    const filterExpr=typeFilterForGroup(g);
    const layerVisibility=g.visible===false?'none':'visible';
    const opacity=normalizedOpacity(g);
    if(!filterExpr){
      skipped++;
      return;
    }
    const oMin=Math.min(...valid.map(s=>s.zMin));
    const oMax=Math.max(...valid.map(s=>s.zMax));

    if(g.type==='symbol'){
      const symbolCollision=symbolCollisionLayoutForGroup(g);
      const ie=stepExpression(valid[0].icon,valid.slice(1).map(s=>({zoom:Number(s.zMin)||0,value:s.icon})));
      // icon-size = desired display px / sprite tile px (tileW from tileSizes)
      const se=symbolSizeExpression(valid,g,tileSizes);
      const lid='sym-'+g.id;
      try{
        map.addLayer(layerDefinitionForGroup(lid,g,src,filterExpr,oMin,oMax,{
          'visibility':layerVisibility,
          'icon-image':ie,
          'icon-size':se,
          'icon-anchor':'center',
          'icon-padding':0,
          'icon-allow-overlap':symbolCollision.iconAllowOverlap,
          'icon-ignore-placement':symbolCollision.iconIgnorePlacement
        },{
          'icon-opacity':opacity
        }),beforeLayerForGroup(g));
        active.push(lid); sc++;
      }catch(e){console.warn(lid,e);}

    }else if(g.type==='pattern'){
      const pe=patternImageExpression(valid,g,'pattern');
      const lid='pat-'+g.id;
      const fadeSourceId='fade-src-'+g.id;
      const fadeLayerId='fade-'+g.id;
      try{
        map.addLayer(layerDefinitionForGroup(lid,g,src,filterExpr,oMin,oMax,{'visibility':layerVisibility},{
          'fill-pattern':pe,
          'fill-opacity':opacity
        }),beforeLayerForGroup(g));
        active.push(lid); pc++;
        if(normalizedPatternFadeEnabled(g)&&src.sourceLayer){
          if(map.getSource(fadeSourceId)) map.removeSource(fadeSourceId);
          map.addSource(fadeSourceId,{type:'geojson',data:patternFadeFeatureCollection(g,src,filterExpr)});
          activeGeneratedSourceIds.push(fadeSourceId);
          map.addLayer({
            id:fadeLayerId,
            type:'fill',
            source:fadeSourceId,
            minzoom:oMin,
            maxzoom:oMax,
            layout:{'visibility':layerVisibility},
            paint:{
              'fill-color':'#f5f4ec',
              'fill-opacity':patternFadeOpacityExpression(g),
              'fill-antialias':true
            }
          },beforeLayerForGroup(g));
          active.push(fadeLayerId);
          patternFadeRenderers.push({sourceId:fadeSourceId,group:g,src,filterExpr});
        }
      }catch(e){console.warn(lid,e);}
    }else if(g.type==='linepattern'){
      const pe=patternImageExpression(valid,g,'linepattern');
      const lid='linepat-'+g.id;
      try{
        map.addLayer(layerDefinitionForGroup(lid,g,src,filterExpr,oMin,oMax,{
          'visibility':layerVisibility,
          'line-cap':'round',
          'line-join':'round'
        },{
          'line-pattern':pe,
          'line-width':lineWidthExpression(valid,g),
          'line-opacity':opacity
        }),beforeLayerForGroup(g));
        active.push(lid); lc++;
      }catch(e){console.warn(lid,e);}
    }else{
      const sourceId='edge-src-'+g.id;
      const lid='edge-'+g.id;
      const edgeData=edgePointFeatureCollection(g,valid,src,filterExpr);
      const ie=stepExpression(valid[0].icon,valid.slice(1).map(s=>({zoom:Number(s.zMin)||0,value:s.icon})));
      const se=symbolSizeExpression(edgePointSizeSlots(valid,g),g,tileSizes);
      try{
        if(map.getSource(sourceId)) map.removeSource(sourceId);
        map.addSource(sourceId,{type:'geojson',data:edgeData});
        activeGeneratedSourceIds.push(sourceId);
        map.addLayer({
          id:lid,
          type:'symbol',
          source:sourceId,
          minzoom:oMin,
          maxzoom:oMax,
          layout:{
            'visibility':layerVisibility,
            'icon-image':ie,
            'icon-size':se,
            'icon-anchor':'center',
            'icon-padding':0,
            'icon-allow-overlap':true,
            'icon-ignore-placement':true
          },
          paint:{
            'icon-opacity':opacity
          }
        },beforeLayerForGroup(g));
        active.push(lid);
        edgePointRenderers.push({sourceId,group:g,valid,src,filterExpr});
        ec++;
      }catch(e){console.warn(lid,e);}
    }
  });

  let spriteUploadOk=true;
  try{
    pngBlob=await uploadSpriteToServer(jsonOut,cv,jout2x,cv2x);
  }catch(e){
    spriteUploadOk=false;
    console.warn(e);
    try{
      pngBlob=await canvasToBlob(cv);
      spritePngDataUrl=await blobToDataUrl(pngBlob);
      png2xBlob=await canvasToBlob(cv2x);
      sprite2xPngDataUrl=await blobToDataUrl(png2xBlob);
    }catch(err){console.warn(err);}
  }
  document.getElementById('dp').disabled=!pngBlob;
  document.getElementById('dj').disabled=false;
  document.getElementById('dp2').disabled=!png2xBlob;
  document.getElementById('dj2').disabled=!json2xOut;
  persistState();
  syncLegendState();
  updateLegend();
  applyNativePoiVisibility();

  genCode();

  // Warn if current zoom is outside all active layer ranges
  const curZ = map.getZoom();
  let inRange = false;
  orderedGroupsForMapBuild().forEach(g=>{
    if(g.visible===false) return;
    const v=g.slots.filter(s=>s.icon&&pool[s.icon]);
    if(!v.length) return;
    const oMin=Math.min(...v.map(s=>s.zMin));
    const oMax=Math.max(...v.map(s=>s.zMax));
    if(curZ>=oMin && curZ<=oMax) inRange=true;
  });
  const statusWarn = !inRange && groups.some(g=>g.visible!==false&&g.slots.some(s=>s.icon)) ? ` | Zoom ${curZ.toFixed(1)} outside all zoom ranges` : '';
  const skipWarn = skipped ? ` | ${skipped} group(s) skipped due to missing type filter` : '';
  const spriteWarn = spriteUploadOk ? '' : ' | Sprite upload to localhost:8080 failed';
  ss(names.length+' Icons | '+sc+' Symbols | '+pc+' Patterns | '+lc+' Line Patterns | '+ec+' Forest Edges'+statusWarn+skipWarn+spriteWarn,(statusWarn||skipWarn||spriteWarn)?'err':'ok');
}

function genCode(){
  const now=new Date().toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let c='sprite: "'+SPRITE_URL+'",\n\n';
  orderedGroupsForMapBuild().forEach(g=>{
    const v=g.slots.filter(s=>s.icon).sort((a,b)=>a.zMin-b.zMin);
    if(!v.length)return;
    const src=sourceMetaForGroup(g);
    const filterExpr=typeFilterForGroup(g);
    const layerVisibility=g.visible===false?'none':'visible';
    const opacity=normalizedOpacity(g);
    const oMin=Math.min(...v.map(s=>s.zMin));
    const oMax=Math.max(...v.map(s=>s.zMax));
    const subtypePart=(src.subtypeField&&g.subtypeValue) ? ' | '+src.subtypeField+'='+g.subtypeValue : '';
    c+='// '+g.name+' | '+(src.sourceLayer||src.source)+' | '+(src.typeField||'type')+'='+(g.typeValue||'')+subtypePart+' | scale='+(g.smoothScale===true?'interpolate':'step')+' | Z'+oMin+'-'+oMax+'\n';
    if(g.type==='symbol'){
      const symbolCollision=symbolCollisionLayoutForGroup(g);
      const ie=JSON.stringify(stepExpression(v[0].icon,v.slice(1).map(s=>({zoom:Number(s.zMin)||0,value:s.icon})))).replace(/"/g,"'");
      const codeTileSizes={};
      v.forEach(slot=>{
        const w=Math.max(1,Number(slot.px)||1,Number(slot.pxMax)||Number(slot.px)||1);
        codeTileSizes[slot.icon]={w:Math.max(w,codeTileSizes[slot.icon]?codeTileSizes[slot.icon].w:1)};
      });
      const expr=symbolSizeExpression(v,g,codeTileSizes);
      const se=JSON.stringify(expr).replace(/"/g,"'");
      const beforeId=beforeLayerForGroup(g);
      c+="map.addLayer({\n";
      c+="  id:'"+g.id+"',\n";
      c+="  type:'symbol',\n";
      c+="  source:'"+src.source+"',\n";
      if(src.sourceLayer) c+="  'source-layer':'"+src.sourceLayer+"',\n";
      if(filterExpr) c+="  filter:"+JSON.stringify(filterExpr)+",\n";
      c+="  minzoom:"+oMin+",\n";
      c+="  maxzoom:"+oMax+",\n";
      c+="  layout:{\n";
      c+="    'visibility':'"+layerVisibility+"',\n";
      c+="    'icon-image':"+ie+",\n";
      c+="    'icon-size':"+se+",\n";
      c+="    'icon-anchor':'center',\n";
      c+="    'icon-padding':0,\n";
      c+="    'icon-allow-overlap':"+(symbolCollision.iconAllowOverlap?'true':'false')+",\n";
      c+="    'icon-ignore-placement':"+(symbolCollision.iconIgnorePlacement?'true':'false')+"\n";
      c+="  },\n";
      c+="  paint:{'icon-opacity':"+opacity+"}\n";
      c+="}";
      if(beforeId) c+=",'"+beforeId+"'";
      c+=");\n\n";
    }else if(g.type==='pattern'){
      const pe=JSON.stringify(stepExpression(v[0].icon,v.slice(1).map(s=>({zoom:Number(s.zMin)||0,value:s.icon})))).replace(/"/g,"'");
      c+="map.addLayer({\n";
      c+="  id:'"+g.id+"',\n";
      c+="  type:'fill',\n";
      c+="  source:'"+src.source+"',\n";
      if(src.sourceLayer) c+="  'source-layer':'"+src.sourceLayer+"',\n";
      if(filterExpr) c+="  filter:"+JSON.stringify(filterExpr)+",\n";
      c+="  minzoom:"+oMin+",\n";
      c+="  maxzoom:"+oMax+",\n";
      c+="  layout:{'visibility':'"+layerVisibility+"'},\n";
      c+="  paint:{'fill-pattern':"+pe+",'fill-opacity':"+opacity+"}\n";
      c+="}";
      const beforeId=beforeLayerForGroup(g);
      if(beforeId) c+=",'"+beforeId+"'";
      c+=");\n";
      c+="// Preview uses derived pattern sizes: "+v.map(s=>"Z"+s.zMin+"-"+s.zMax+" -> "+s.px+"-"+(s.pxMax||s.px)+"px").join(', ')+"\n\n";
      if(normalizedPatternFadeEnabled(g)){
        c+="// Soft edge fade is enabled in the test environment: width "+normalizedPatternFadeWidthPx(g)+"px | edge opacity "+normalizedPatternFadeOpacity(g)+".\n";
        c+="// It is rendered from temporary GeoJSON edge-band polygons generated from currently visible vector-tile features.\n\n";
      }
    }else if(g.type==='linepattern'){
      const pe=JSON.stringify(stepExpression(v[0].icon,v.slice(1).map(s=>({zoom:Number(s.zMin)||0,value:s.icon})))).replace(/"/g,"'");
      const lw=JSON.stringify(lineWidthExpression(v,g)).replace(/"/g,"'");
      const gapPx=normalizedLineGapPx(g);
      const heightScale=normalizedLineHeightScale(g);
      const organicMode=normalizedLineOrganic(g);
      c+="map.addLayer({\n";
      c+="  id:'"+g.id+"',\n";
      c+="  type:'line',\n";
      c+="  source:'"+src.source+"',\n";
      if(src.sourceLayer) c+="  'source-layer':'"+src.sourceLayer+"',\n";
      if(filterExpr) c+="  filter:"+JSON.stringify(filterExpr)+",\n";
      c+="  minzoom:"+oMin+",\n";
      c+="  maxzoom:"+oMax+",\n";
      c+="  layout:{'visibility':'"+layerVisibility+"','line-cap':'round','line-join':'round'},\n";
      c+="  paint:{'line-pattern':"+pe+",'line-width':"+lw+",'line-opacity':"+opacity+"}\n";
      c+="}";
      const beforeId=beforeLayerForGroup(g);
      if(beforeId) c+=",'"+beforeId+"'";
      c+=");\n";
      c+="// Preview uses derived dashed line-pattern sizes: "+v.map(s=>"Z"+s.zMin+"-"+s.zMax+" -> "+s.px+"-"+(s.pxMax||s.px)+"px").join(', ')+" | gap "+gapPx+"px | height scale "+heightScale+" | organic "+(organicMode?'on':'off')+"\n\n";
    }else{
      c+="// Forest Edge is generated in the test environment from visible "+(src.sourceLayer||src.source)+" polygons.\n";
      c+="// It creates a temporary GeoJSON point source along polygon edges and renders these points as symbols.\n";
      c+="// Opacity in this preview group: "+opacity+".\n";
      c+="// Recreate this workflow in production by exporting/precomputing a stable forest-edge point GeoJSON.\n\n";
    }
  });
  c+='\n/* Concept and design: Glenys Bischoff | Created with support from Claude AI and Codex | Sprite generation based on https://github.com/stevage/mbsprite | Date: '+now+' */';
  document.getElementById('co').textContent=c;
}

}

  const b=new Blob([JSON.stringify(jsonOut,null,2)],{type:'application/json'});

}
function dlPng2x(){

}
function dlJson2x(){
  if(!json2xOut)return;
  const b=new Blob([JSON.stringify(json2xOut,null,2)],{type:'application/json'});

}

nativePoiVisible=!(initialSavedState&&initialSavedState.nativePoiVisible===false);
nativeAreaVisible=!(initialSavedState&&initialSavedState.nativeAreaVisible===false);

async function onBaseStyleLoaded(){
  zi.textContent='Zoom: '+map.getZoom().toFixed(1);
  const sourceId=configureBaseVectorSource();
  if(!sourceId){
    ss('Basemap loaded, but no matching vector tile source was found','err');
    return;
  }
  ensureCustomGeoJsonSources();
  nativePoiIconOpacityState={};
  nativePoiTextLayoutState={};
  applyBasemapLayerTweaks();
  applyNativePoiVisibility();
  applyNativeAreaVisibility();
  const basemap=currentBasemapConfig();
  let restored=false;
  if(!appStateRestored){
    restored=await restorePersistedState();
    appStateRestored=true;
  }else{
    renderBasemapControls();
    updateHeaderNote();
    renderNativePoiToggle();
    renderNativeAreaToggle();
    renderInspectToggle();
  }
  ready=true;
  if(!groups.length){
    addGroup('symbol');
    addGroup('pattern');
  }
  const hasRenderableState=Object.keys(pool).length&&groups.some(g=>g.slots.some(s=>s.icon&&pool[s.icon]));
  if(hasRenderableState){
    await build();
  }else{
    genCode();
    syncLegendState();
    updateLegend();
    const msg=restored
      ? 'Ready | State restored from localStorage | '+basemap.styleName+' | Source: '+sourceId
      : 'Ready | '+basemap.styleName+' loaded | Source: '+sourceId+' | Upload PNGs and create groups';
    ss(msg,restored?'ok':'');
  }
}
